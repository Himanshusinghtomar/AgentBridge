version: '3.9'
services:
  agentbridge:
    build: ..
    ports:
      - "3030:3030"
    environment:
      - PORT=3030
      - PLAYWRIGHT_HEADLESS=true
    volumes:
      - ../data:/app/data
    shm_size: '1gb'
    depends_on:
      - redis
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
volumes:
  redis-data:
